name: tests

on:
  push:
  pull_request:

jobs:
  architecture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check architecture contract
        run: python ./scripts/check-architecture.py

      - name: Check file/function size limits
        run: python ./scripts/check-code-size.py

      - name: Check design-note requirement for critical module changes
        if: github.event_name == 'pull_request'
        run: |
          python ./scripts/check-design-note.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.sha }}"

  tests:
    needs: architecture
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install curl (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S . -B build -DERKAO_WERROR=ON

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        shell: pwsh
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DERKAO_WERROR=ON

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Debug

      - name: Build (Unix)
        if: runner.os != 'Windows'
        shell: pwsh
        run: cmake --build build

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ERKAO_HTTP_TEST: "1"
        run: ./scripts/run-tests.ps1

      - name: Setup scripts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: bash ./scripts/unix/setup.sh

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          ERKAO_HTTP_TEST: "1"
        run: bash ./scripts/unix/run-tests.sh

  performance:
    needs: architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install curl (Linux)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure (performance)
        run: cmake -S . -B build-perf -DERKAO_GRAPHICS=OFF -DERKAO_WERROR=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build (performance)
        run: cmake --build build-perf

      - name: Run benchmarks (performance gate)
        run: python ./scripts/check-bench.py --exe build-perf/erkao --repeat 5 --max-regression-pct 8 --min-slack-ms 20

  sanitizers:
    needs: architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install curl (Linux)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure (ASAN/UBSAN)
        run: cmake -S . -B build-sanitize -DERKAO_GRAPHICS=OFF -DERKAO_SANITIZERS=ON -DERKAO_WERROR=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=clang

      - name: Build (ASAN/UBSAN)
        run: cmake --build build-sanitize

      - name: Setup scripts (Linux)
        run: bash ./scripts/unix/setup.sh

      - name: Run tests (ASAN/UBSAN)
        env:
          ERKAO_HTTP_TEST: "1"
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=1"
          UBSAN_OPTIONS: "halt_on_error=1:print_stacktrace=1"
        run: bash ./scripts/unix/run-tests.sh --exe build-sanitize/erkao

  coverage:
    needs: architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install coverage tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev
          python -m pip install --upgrade pip gcovr

      - name: Configure (coverage)
        run: >
          cmake -S . -B build-coverage
          -DERKAO_GRAPHICS=OFF
          -DERKAO_WERROR=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="--coverage -O0"
          -DCMAKE_EXE_LINKER_FLAGS="--coverage"

      - name: Build (coverage)
        run: cmake --build build-coverage

      - name: Setup scripts (Linux)
        run: bash ./scripts/unix/setup.sh

      - name: Run tests (coverage)
        env:
          ERKAO_HTTP_TEST: "1"
        run: bash ./scripts/unix/run-tests.sh --exe build-coverage/erkao

      - name: Collect coverage
        run: gcovr --root . --filter src --json coverage.json

      - name: Enforce critical module coverage thresholds
        run: python ./scripts/check-critical-coverage.py --coverage-json coverage.json --min-line-coverage 5.0

  static-analysis:
    needs: architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install analysis tools
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev clang clang-tidy cppcheck

      - name: Configure (analysis)
        run: cmake -S . -B build-analysis -DERKAO_GRAPHICS=OFF -DERKAO_WERROR=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_C_COMPILER=clang

      - name: Run cppcheck
        run: |
          cppcheck \
            --quiet \
            --std=c99 \
            --enable=warning,performance,portability \
            --inconclusive \
            --suppress=missingIncludeSystem \
            --template='{file}:{line}:{severity}:{id}:{message}' \
            src 2> cppcheck-report.txt

      - name: Run clang-tidy
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          compile_db = Path("build-analysis/compile_commands.json")
          files = []
          if compile_db.exists():
              data = json.loads(compile_db.read_text(encoding="utf-8"))
              seen = set()
              for entry in data:
                  path = entry.get("file")
                  if not isinstance(path, str):
                      continue
                  norm = path.replace("\\", "/")
                  if "/src/" not in norm:
                      continue
                  if norm in seen:
                      continue
                  seen.add(norm)
                  files.append(path)
          files.sort()
          Path("clang-tidy-files.txt").write_text(
              "\n".join(files) + ("\n" if files else ""),
              encoding="utf-8",
          )
          PY
          if [ -s clang-tidy-files.txt ]; then
            clang-tidy \
              -p build-analysis \
              -checks='-*,clang-analyzer-*,bugprone-*,performance-*,portability-*' \
              $(cat clang-tidy-files.txt) > clang-tidy-report.txt 2>&1 || true
          else
            : > clang-tidy-report.txt
          fi

      - name: Enforce zero new static analysis issues
        run: |
          python ./scripts/check-static-analysis.py \
            --baseline docs/static_analysis_baseline.txt \
            --cppcheck cppcheck-report.txt \
            --clang-tidy clang-tidy-report.txt \
            --write-findings static-analysis-current.txt

      - name: Upload static analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-reports
          path: |
            cppcheck-report.txt
            clang-tidy-report.txt
            static-analysis-current.txt

  fuzz:
    needs: architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install curl (Linux)
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure (fuzz)
        run: cmake -S . -B build-fuzz -DERKAO_GRAPHICS=OFF -DERKAO_FUZZ=ON -DERKAO_WERROR=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_C_COMPILER=clang

      - name: Build (fuzz)
        run: cmake --build build-fuzz

      - name: Run fuzzers
        run: |
          ./build-fuzz/erkao_fuzz_lexer -max_total_time=20 -timeout=2
          ./build-fuzz/erkao_fuzz_parser -max_total_time=20 -timeout=2
          ./build-fuzz/erkao_fuzz_runtime -max_total_time=20 -timeout=2
          ./build-fuzz/erkao_fuzz_import -max_total_time=20 -timeout=2
          ./build-fuzz/erkao_fuzz_http -max_total_time=20 -timeout=2
